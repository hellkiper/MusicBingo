<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальное бинго</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;700;900&family=Pacifico&family=Comfortaa:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@400;700;900&family=Marck+Script&family=Great+Vibes&family=Neucha&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('bingoVideo');
            if (video) video.load();
        });
        window.addEventListener('load', function() {
            const video = document.getElementById('bingoVideo');
            if (video && video.readyState === 0) {
                video.load();
            }
            requestAnimationFrame(function() {
                const hero = document.getElementById('heroContent');
                if (hero) hero.classList.add('shine-sync');
            });
        });
    </script>
</head>
<body>
    <div id="bingoTransition" class="bingo-transition hidden">
        <div id="transitionPetalsContainer" class="transition-petals-container" aria-hidden="true"></div>
        <div class="spotlight spotlight-left"></div>
        <div class="spotlight spotlight-right"></div>
        
        <div class="transition-text">
            <div class="t-char" style="--dx: -100vw; --dy: -100vh;">
                <span>Б</span>
            </div>
            <div class="t-char" style="--dx: -50vw; --dy: 100vh;">
                <span>И</span>
            </div>
            <div class="t-char" style="--dx: 0px; --dy: -120vh;">
                <span>Н</span>
            </div>
            <div class="t-char" style="--dx: 50vw; --dy: 100vh;">
                <span>Г</span>
            </div>
            <div class="t-char" style="--dx: 100vw; --dy: -100vh;">
                <span>О</span>
            </div>
        </div>
    </div>
    <div class="bg-overlay"></div>
    

    <img src="assets/Tulpani.webp" class="page3-tulip-fixed" id="page3TulipRight" style="display:none;" alt="">

    <section id="page1" class="page page-hero">
        <div id="heroPetalsContainer" class="hero-petals-container" aria-hidden="true"></div>
        <img src="assets/proigrivatel.webp" class="hero-player" alt="">
        <img src="assets/tulpani.webp" class="hero-player-tulpani" alt="">

        <div class="hero-content" id="heroContent">
            <div class="hero-title-wrapper">
                <div class="hero-titles">
                    <h1 class="hero-title-main"><span class="hl">М</span><span class="hl">у</span><span class="hl">з</span><span class="hl">ы</span><span class="hl">к</span><span class="hl">а</span><span class="hl">л</span><span class="hl">ь</span><span class="hl">н</span><span class="hl">о</span><span class="hl">е</span></h1>
                    <h1 class="hero-title-sub"><span class="hl">Б</span><span class="hl">и</span><span class="hl">н</span><span class="hl">г</span><span class="hl">о</span></h1>
                </div>
            </div>
            <div class="hero-cta">
                <button id="startGame" class="primary-btn-pink"><span>ИГРАТЬ</span></button>
            </div>
        </div>
    </section>

    <section id="page2" class="page page-grid hidden">
        <div class="song-background-effects">
            <div class="floating-particles"></div>
        </div>
        <div id="bingoAnimationPage2" class="bingo-animation-page2 hidden">
            <div id="bingoPetalsContainer" class="bingo-petals-container" aria-hidden="true"></div>
            <audio id="bingoBgAudio" src="audio/100.mp3" preload="auto"></audio>
            <video id="bingoVideo" class="bingo-video" playsinline preload="auto" muted>
                <source src="assets/ferverk.mp4" type="video/mp4">
            </video>
            <div class="bingo-text-page2 bingo-text-arrow-path">
                <div class="letter-wrapper letter-along-arrow" style="--i: 0"><span>Б</span></div>
                <div class="letter-wrapper letter-along-arrow" style="--i: 1"><span>И</span></div>
                <div class="letter-wrapper letter-along-arrow" style="--i: 2"><span>Н</span></div>
                <div class="letter-wrapper letter-along-arrow" style="--i: 3"><span>Г</span></div>
                <div class="letter-wrapper letter-along-arrow" style="--i: 4"><span>О</span></div>
            </div>
        </div>
        <div class="top-bar">
            <h1 class="page2-title">МУЗЫКАЛЬНОЕ&ensp;БИНГО</h1>
            <p class="page2-progress">Сыграно: <span id="selectedCount">0</span>/90</p>
        </div>
        <div id="barrelGrid" class="barrel-grid"></div>
    </section>

    <section id="page3" class="page page-song hidden">
        <div id="page3PetalsContainer" class="page3-petals-container" aria-hidden="true"></div>
        <img src="assets/Tulpani.webp" class="page3-tulip page3-tulip-left" alt="">
        <div class="song-background-effects">
            <div class="spotlight spotlight-left"></div>
            <div class="spotlight spotlight-right"></div>
        </div>
        <div class="song-card">
            <div class="cover-wrap" oncontextmenu="return false;">
                <div id="songCover" class="song-cover-bg"></div>
                <div class="cover-block-overlay" aria-hidden="true"></div>
            </div>

            <div class="song-meta">
                <div class="song-number" id="songNumber">Бочонок</div>
                <h2 id="songTitle">Название песни</h2>
                <p id="songArtist">Автор</p>
            </div>
            <div class="audio-player">
                <audio id="songAudio" autoplay></audio>
                <div class="audio-controls-minimal">
                    <div class="progress-container">
                        <div class="progress-line">
                            <div class="progress-fill-minimal" id="progressFill"></div>
                            <input type="range" class="progress-slider-minimal" id="progressSlider" min="0" max="100" value="0">
                        </div>
                        <div class="audio-time-minimal">
                            <span class="current-time" id="currentTime">0:00</span>
                        </div>
                    </div>
                    <button class="play-pause-btn-minimal" id="playPauseBtn">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <section id="page4" class="page page-qr hidden">
        <div class="qr-page-content">
            <div class="qr-codes">
                <div class="qr-item">
                    <img src="assets/vk.png" alt="ВКонтакте" class="qr-img">
                    <span class="qr-label">ВКонтакте</span>
                </div>
                <div class="qr-item">
                    <img src="assets/forma.png" alt="Вопросики" class="qr-img">
                    <span class="qr-label">Вопросики</span>
                </div>
                <div class="qr-item">
                    <img src="assets/tg.png" alt="Telegram" class="qr-img">
                    <span class="qr-label">Telegram</span>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js?v=6"></script>
</body>
</html>
